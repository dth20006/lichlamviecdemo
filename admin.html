<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚙️ Admin Scheduler</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #13131f;
  --bg-dark-2: #1a1a2c;
  --card-bg: rgba(255, 255, 255, 0.08);
  --card-stroke: rgba(255, 255, 255, 0.14);
  --neon-pink: #ff85b3;
  --neon-blue: #89dceb;
  --neon-purple: #cba6f7;
  --neon-green: #a6e3a1;
  --neon-yellow: #f9e2af;
  --text-main: #eef1ff;
  --shadow-dark: rgba(0, 0, 0, 0.35);
  --shadow-soft: rgba(255, 255, 255, 0.05);
}
* { box-sizing: border-box; }
body {
  font-family: 'Lexend', sans-serif;
  background:
    radial-gradient(circle at top left, rgba(137,220,235,0.18), transparent 28%),
    radial-gradient(circle at top right, rgba(255,133,179,0.18), transparent 24%),
    radial-gradient(circle at bottom center, rgba(203,166,247,0.14), transparent 26%),
    linear-gradient(145deg, var(--bg-dark), var(--bg-dark-2));
  color: var(--text-main);
  margin: 0;
  padding: 0 16px 40px 16px;
  min-height: 100vh;
}
.header-ios {
  padding: 40px 0 20px 0;
  position: sticky;
  top: 0;
  background: rgba(15, 15, 24, 0.42);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  z-index: 100;
  margin: 0 -16px 20px -16px;
  padding-left: 16px;
  padding-right: 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.title {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(to right, var(--neon-pink), var(--neon-purple), var(--neon-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-btn {
  text-decoration: none;
  padding: 12px 16px;
  border-radius: 16px;
  font-weight: 800;
  color: #000;
  background: linear-gradient(135deg, var(--neon-green), #d8ffd2);
}
.container {
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
}
.card {
  background: var(--card-bg);
  border-radius: 32px;
  padding: 22px;
  border: 1px solid var(--card-stroke);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  box-shadow:
    18px 18px 32px rgba(0, 0, 0, 0.28),
    -10px -10px 24px rgba(255,255,255,0.035),
    inset 1px 1px 0 rgba(255,255,255,0.12);
}
.card h3 {
  margin-top: 0;
  font-size: 19px;
  color: var(--neon-purple);
  font-weight: 800;
}
.admin-section-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--neon-yellow);
  margin: 10px 0 0;
  text-align: center;
  text-shadow: 0 0 12px rgba(249,226,175,0.25);
}
.admin-note {
  font-size: 12px;
  color: var(--neon-blue);
  margin-bottom: 10px;
  display: block;
  line-height: 1.6;
}
.admin-status {
  text-align: center;
  color: var(--neon-green);
  font-weight: bold;
  margin: 15px 0;
}
.admin-input,
.admin-textarea {
  width: 100%;
  background: rgba(0,0,0,0.16);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  border-radius: 18px;
  padding: 14px 16px;
  font-size: 15px;
  outline: none;
  font-family: 'Lexend', sans-serif;
}
.admin-textarea {
  min-height: 180px;
  resize: vertical;
}
.admin-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.admin-btn {
  background: rgba(255,255,255,0.02);
  color: var(--neon-pink);
  border: 2px dashed var(--neon-pink);
  border-radius: 18px;
  padding: 14px;
  cursor: pointer;
  font-weight: 800;
  width: 100%;
  margin-top: 12px;
  font-family: 'Lexend', sans-serif;
}
.admin-btn.blue {
  color: #000;
  border: none;
  background: linear-gradient(135deg, var(--neon-blue), #b8f2ff);
}
.admin-btn.green {
  color: #000;
  border: none;
  background: linear-gradient(135deg, var(--neon-green), #d8ffd2);
}
.admin-btn.red {
  color: #fff;
  border: none;
  background: linear-gradient(135deg, #f38ba8, #ff6f91);
}
.admin-day-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 15px;
}
.admin-day-item {
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.08);
}
.admin-day-item.active {
  background: var(--neon-purple);
  color: #000;
  font-weight: bold;
}
#adminEditor { display: none; }
</style>
</head>
<body>

  <div class="header-ios">
    <div class="header-top">
      <div class="title">⚙️ Admin Scheduler</div>
      <a class="nav-btn" href="index.html">🏠 Về trang chủ</a>
    </div>
  </div>

  <div class="container">
    <div class="admin-section-title">🤖 Khu Admin AI Scheduler</div>

    <div class="card">
      <h3>🪄 Tạo / Sửa / Đồng bộ lịch</h3>

      <span class="admin-note">
        💡 Dán bảng TKB FPT ở đây. AI sẽ bỏ DAT103, VIE111, Giáo dục thể chất; giữ ENT123, DAT1071; môn online fix 14:10-16:10; ngày trống sẽ tự thêm ship + ăn + ngủ.
      </span>

      <textarea id="tkbInput" class="admin-textarea" placeholder="Dán bảng TKB tại đây..."></textarea>

      <div class="admin-row">
        <button class="admin-btn" onclick="processTKB()">🪄 PHÂN TÍCH & TẠO LỊCH</button>
        <button class="admin-btn blue" onclick="loadScheduleFromCloud()">☁️ TẢI LỊCH TỪ CLOUD</button>
      </div>

      <div id="adminStatus" class="admin-status"></div>
    </div>

    <div class="card" id="adminListArea" style="display:none;">
      <h3>📅 Danh sách ngày</h3>
      <div class="admin-day-grid" id="adminDayGrid"></div>
    </div>

    <div class="card" id="adminEditor">
      <h3 id="editLabel">Chỉnh sửa ngày</h3>
      <input type="text" id="editDate" class="admin-input" style="margin-bottom:10px;">
      <textarea id="editTasks" class="admin-textarea" style="min-height:250px;"></textarea>

      <div class="admin-row">
        <button class="admin-btn green" onclick="saveEdit()">💾 Lưu thay đổi</button>
        <button class="admin-btn red" onclick="deleteDay()">🗑️ Xóa ngày</button>
      </div>
    </div>

    <button onclick="syncToCloud()" id="btnSync" class="admin-btn blue" style="display:none; font-size: 18px;">
      🚀 ĐỒNG BỘ LÊN CLOUD
    </button>
  </div>

<script>
let schedule = [];
let currentAdminIndex = -1;

const FIREBASE_PROJECT_ID = "deas-75de8";
const FIREBASE_BASE_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;
const FIREBASE_SCHEDULE_URL = `${FIREBASE_BASE_URL}/warrior/root/schedule/main`;

function parseFirestoreString(fieldObj, fallback = "") {
  if (!fieldObj) return fallback;
  if (fieldObj.stringValue !== undefined) return fieldObj.stringValue;
  return fallback;
}

function safeJsonParse(text, fallback) {
  try {
    return JSON.parse(text);
  } catch (e) {
    return fallback;
  }
}

function setAdminStatus(text, color = "var(--neon-green)") {
  const el = document.getElementById("adminStatus");
  if (!el) return;
  el.innerText = text;
  el.style.color = color;
}

function formatDateKey(dateObj) {
  const day = String(dateObj.getDate()).padStart(2, '0');
  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
  return `${day}/${month}`;
}

function buildStudyDaySchedule(date, classList) {
  let tasks = [date];
  tasks.push("00:00-06:00 Ngủ");
  tasks.push("06:00-09:00 Ship");
  tasks.push("11:30-12:00 Ăn trưa");
  tasks.push("12:00-13:30 Ship");

  classList.forEach(c => tasks.push(c));

  tasks.push("16:30-20:00 Ship");
  tasks.push("20:00-20:30 Ăn tối");
  tasks.push("21:00-23:30 Ship");

  const header = tasks.shift();
  tasks.sort();
  return [header, ...tasks];
}

function buildFreeDaySchedule(date) {
  let tasks = [date];
  tasks.push("00:00-06:00 Ngủ");
  tasks.push("06:00-11:30 Ship");
  tasks.push("11:30-12:00 Ăn trưa");
  tasks.push("12:00-20:00 Ship");
  tasks.push("20:00-20:30 Ăn tối");
  tasks.push("20:30-23:59 Ship");
  return tasks;
}

function processTKB() {
  const rawText = document.getElementById('tkbInput').value.trim();
  if (!rawText) return alert("Bé chưa dán gì cả!");

  const lines = rawText.split('\n').filter(line => line.trim() !== "");
  const classesByDate = {};
  let minDate = null;
  let maxDate = null;

  lines.forEach(line => {
    const dateMatch = line.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if (!dateMatch) return;

    const day = parseInt(dateMatch[1], 10);
    const month = parseInt(dateMatch[2], 10) - 1;
    const year = parseInt(dateMatch[3], 10);
    const dateObj = new Date(year, month, day);
    const dateStr = formatDateKey(dateObj);

    if (!minDate || dateObj < minDate) minDate = new Date(dateObj);
    if (!maxDate || dateObj > maxDate) maxDate = new Date(dateObj);

    if (line.includes("DAT103") || line.includes("VIE111") || line.includes("Giáo dục thể chất")) {
      return;
    }

    const subjectMatch = line.match(/[A-Z]{3,4}\d{3,4}/);
    const subject = subjectMatch ? subjectMatch[0] : "Học tập";

    const isOnlineClass =
      line.includes("Google Meet") ||
      line.includes("Học Online") ||
      line.includes("Meet");

    let timeStr = "14:10-16:10";
    if (!isOnlineClass) {
      const timeMatch = line.match(/(\d{2}:\d{2}):\d{2}\s*-\s*(\d{2}:\d{2}):\d{2}/);
      if (timeMatch) {
        timeStr = `${timeMatch[1]}-${timeMatch[2]}`;
      }
    }

    if (!classesByDate[dateStr]) classesByDate[dateStr] = [];
    classesByDate[dateStr].push(`${timeStr} ${subject}`);
  });

  if (!minDate || !maxDate) {
    return alert("Không đọc được ngày từ bảng lịch!");
  }

  schedule = [];
  const currentDate = new Date(minDate);

  while (currentDate <= maxDate) {
    const dateStr = formatDateKey(currentDate);
    const classList = classesByDate[dateStr] || [];

    if (classList.length > 0) {
      classList.sort();
      schedule.push(buildStudyDaySchedule(dateStr, classList));
    } else {
      schedule.push(buildFreeDaySchedule(dateStr));
    }

    currentDate.setDate(currentDate.getDate() + 1);
  }

  currentAdminIndex = -1;
  renderAdminGrid();

  document.getElementById('adminListArea').style.display = 'block';
  document.getElementById('btnSync').style.display = 'block';
  document.getElementById('adminEditor').style.display = 'none';
  setAdminStatus(`✅ Đã tạo lịch cho ${schedule.length} ngày!`);
}

function renderAdminGrid() {
  const adminGrid = document.getElementById('adminDayGrid');
  if (!adminGrid) return;

  adminGrid.innerHTML = "";

  if (!Array.isArray(schedule) || schedule.length === 0) {
    document.getElementById('adminListArea').style.display = 'none';
    document.getElementById('btnSync').style.display = 'none';
    return;
  }

  document.getElementById('adminListArea').style.display = 'block';
  document.getElementById('btnSync').style.display = 'block';

  schedule.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = `admin-day-item ${currentAdminIndex === i ? 'active' : ''}`;
    item.innerText = d[0];
    item.onclick = () => openEdit(i);
    adminGrid.appendChild(item);
  });
}

function openEdit(i) {
  currentAdminIndex = i;
  renderAdminGrid();
  document.getElementById('adminEditor').style.display = 'block';
  document.getElementById('editDate').value = schedule[i][0];
  document.getElementById('editTasks').value = schedule[i].slice(1).join('\n');
  document.getElementById('editLabel').innerText = "Ngày " + schedule[i][0];
}

function saveEdit() {
  if (currentAdminIndex < 0) return;
  const date = document.getElementById('editDate').value.trim();
  const tasks = document.getElementById('editTasks').value
    .split('\n')
    .map(t => t.trim())
    .filter(t => t !== "");

  if (!date) return alert("Ngày không được để trống.");

  schedule[currentAdminIndex] = [date, ...tasks];
  renderAdminGrid();
  setAdminStatus(`💾 Đã cập nhật ngày ${date}`);
}

function deleteDay() {
  if (currentAdminIndex < 0) return;
  if (confirm("Xóa ngày này?")) {
    schedule.splice(currentAdminIndex, 1);
    currentAdminIndex = -1;
    document.getElementById('adminEditor').style.display = 'none';
    renderAdminGrid();
    setAdminStatus("🗑️ Đã xóa ngày khỏi lịch hiện tại.");
  }
}

async function loadScheduleFromCloud() {
  setAdminStatus("⏳ Đang tải lịch từ Cloud...", "var(--neon-yellow)");
  try {
    const res = await fetch(FIREBASE_SCHEDULE_URL);
    if (!res.ok) throw new Error("Không tải được schedule");

    const data = await res.json();
    const scheduleStr = parseFirestoreString(data?.fields?.scheduleData, "[]");
    const parsed = safeJsonParse(scheduleStr, []);

    if (!Array.isArray(parsed) || parsed.length === 0) {
      schedule = [];
      currentAdminIndex = -1;
      renderAdminGrid();
      document.getElementById('adminEditor').style.display = 'none';
      setAdminStatus("📭 Cloud chưa có schedule.");
      return;
    }

    schedule = parsed;
    currentAdminIndex = -1;
    renderAdminGrid();
    document.getElementById('adminEditor').style.display = 'none';
    setAdminStatus(`☁️ Đã tải ${schedule.length} ngày từ Cloud.`);
  } catch (e) {
    console.log(e);
    setAdminStatus("❌ Lỗi tải Cloud!", "#ff9bb8");
    alert("Không tải được schedule từ Firebase.");
  }
}

async function syncToCloud() {
  if (!Array.isArray(schedule) || schedule.length === 0) {
    return alert("Chưa có lịch để đồng bộ.");
  }

  setAdminStatus("⏳ Đang gửi lên Cloud...", "var(--neon-yellow)");
  try {
    const res = await fetch(FIREBASE_SCHEDULE_URL, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        fields: {
          scheduleData: { stringValue: JSON.stringify(schedule) },
          updatedAt: { stringValue: new Date().toISOString() }
        }
      })
    });

    if (res.ok) {
      setAdminStatus("🚀 ĐỒNG BỘ THÀNH CÔNG!");
      alert("Đã cập nhật lịch mới lên cloud!");
    } else {
      setAdminStatus("❌ Đồng bộ thất bại!", "#ff9bb8");
      alert("Lỗi khi đồng bộ Firebase!");
    }
  } catch (e) {
    console.log(e);
    setAdminStatus("❌ Lỗi Firebase!", "#ff9bb8");
    alert("Lỗi Firebase!");
  }
}

loadScheduleFromCloud();
</script>
</body>
</html>
