<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚙️ Admin Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="admin">
  <header class="header-ios">
    <div class="header-top">
      <div>
        <div class="title">⚙️ Admin Control Center</div>
        <div class="subtitle">Quản lý lịch, goals, hệ thống, telegram, backup</div>
      </div>
      <a class="nav-btn green" href="index.html">🏠 Về trang chủ</a>
    </div>
  </header>

  <main class="container">
    <!-- Schedule -->
    <section class="card">
      <div class="section-head">
        <h3>🪄 Quản lý Schedule</h3>
      </div>
      <label>Dán TKB FPT</label>
      <textarea id="tkbInput" class="textarea" placeholder="Dán lịch học tại đây..."></textarea>
      <div class="toolbar wrap">
        <button class="btn primary" id="processTKBBtn">Process TKB</button>
        <button class="btn ghost" id="loadCloudScheduleBtn">Tải Cloud</button>
        <button class="btn blue" id="syncCloudScheduleBtn">Đồng bộ Cloud</button>
      </div>
      <div class="summary-note" id="adminStatus">Chưa có thao tác.</div>
    </section>

    <!-- Day editor -->
    <section class="card">
      <div class="section-head">
        <h3>🗓️ Day Editor</h3>
      </div>
      <div class="toolbar wrap">
        <select id="daySelect" class="input"></select>
      </div>
      <label>Danh sách task chi tiết</label>
      <textarea id="dayTasksEditor" class="textarea" placeholder="Mỗi dòng một task"></textarea>
      <div class="toolbar wrap">
        <button class="btn primary" id="saveDayBtn">💾 Lưu ngày</button>
        <button class="btn danger" id="deleteDayBtn">🗑️ Xóa ngày</button>
      </div>
    </section>

    <!-- Goal manager -->
    <section class="card">
      <div class="section-head">
        <h3>🎯 Quản lý mục tiêu</h3>
      </div>
      <div class="form-grid four">
        <input id="goalTitle" class="input" placeholder="Tên mục tiêu">
        <input id="goalAmount" type="number" class="input" placeholder="Số tiền mục tiêu">
        <input id="goalDeadline" type="date" class="input">
        <select id="goalTier" class="input">
          <option value="S">Tier S</option>
          <option value="A">Tier A</option>
          <option value="B">Tier B</option>
          <option value="C">Tier C</option>
        </select>
      </div>
      <div class="toolbar wrap">
        <button class="btn primary" id="addGoalBtn">➕ Thêm mục tiêu</button>
        <button class="btn ghost" id="loadGoalCloudBtn">Tải Goal Cloud</button>
        <button class="btn blue" id="saveGoalCloudBtn">Lưu Goal Cloud</button>
      </div>
      <div id="adminGoalList" class="list-stack"></div>
    </section>

    <!-- System Settings -->
    <section class="card">
      <div class="section-head">
        <h3>🛠️ System Settings</h3>
      </div>
      <div class="form-grid three">
        <div>
          <label>Wage rate</label>
          <input id="wageRateInput" type="number" class="input">
        </div>
        <div>
          <label>Ngưỡng cảnh báo chi tiêu</label>
          <input id="expenseWarnInput" type="number" class="input">
        </div>
        <div>
          <label>Màu chủ đạo</label>
          <input id="themeColorInput" type="color" class="input input-color">
        </div>
      </div>

      <div class="section-mini-title">Telegram</div>
      <div class="form-grid two">
        <input id="telegramBotTokenInput" class="input" placeholder="Telegram Bot Token">
        <input id="telegramChatIdInput" class="input" placeholder="Telegram Chat ID">
      </div>

      <div class="toggle-grid">
        <label><input type="checkbox" id="notifyTaskToggle"> Notify Task</label>
        <label><input type="checkbox" id="notifyIncomeToggle"> Notify Income</label>
        <label><input type="checkbox" id="notifyExpenseToggle"> Notify Expense</label>
        <label><input type="checkbox" id="notifyScheduleToggle"> Notify Schedule</label>
        <label><input type="checkbox" id="warn10Toggle"> Báo trước 10 phút</label>
        <label><input type="checkbox" id="warn30Toggle"> Báo trước 30 phút</label>
      </div>

      <div class="section-mini-title">Phân bổ 4 quỹ (%)</div>
      <div class="form-grid four">
        <input id="fundSavingPercent" type="number" class="input" placeholder="Tiết kiệm">
        <input id="fundFunPercent" type="number" class="input" placeholder="Tiêu vặt">
        <input id="fundEmergencyPercent" type="number" class="input" placeholder="Dự phòng">
        <input id="fundFuturePercent" type="number" class="input" placeholder="Tương lai">
      </div>

      <div class="toolbar wrap">
        <button class="btn primary" id="saveSettingsBtn">💾 Lưu settings</button>
      </div>
    </section>

    <!-- Cat & Insight -->
    <section class="card">
      <div class="section-head">
        <h3>😼 Cat & Insight</h3>
      </div>
      <label>Nội dung Mood mèo mặc định</label>
      <textarea id="catMoodEditor" class="textarea" placeholder="Mỗi dòng: key|label|desc"></textarea>

      <label>Gợi ý AI mặc định</label>
      <textarea id="insightEditor" class="textarea" placeholder="Mỗi dòng 1 gợi ý AI"></textarea>

      <div class="toolbar wrap">
        <button class="btn primary" id="saveCatInsightBtn">💾 Lưu Cat & Insight</button>
      </div>
    </section>

    <!-- Task colors -->
    <section class="card">
      <div class="section-head">
        <h3>🎨 Task Colors</h3>
      </div>
      <div class="form-grid four">
        <div><label>Ship</label><input id="taskColorShip" type="color" class="input input-color"></div>
        <div><label>Study</label><input id="taskColorStudy" type="color" class="input input-color"></div>
        <div><label>Rest</label><input id="taskColorRest" type="color" class="input input-color"></div>
        <div><label>Other</label><input id="taskColorOther" type="color" class="input input-color"></div>
      </div>
      <button class="btn primary" id="saveTaskColorsBtn">💾 Lưu màu task</button>
    </section>

    <!-- Backup restore -->
    <section class="card">
      <div class="section-head">
        <h3>🧰 Backup & Restore</h3>
      </div>
      <div class="toolbar wrap">
        <button class="btn primary" id="exportJsonBtn">Export JSON</button>
        <label class="btn ghost file-btn">
          Import JSON
          <input type="file" id="importJsonInput" hidden accept=".json">
        </label>
        <button class="btn blue" id="exportExpenseCsvBtn">Xuất CSV chi tiêu</button>
        <button class="btn blue" id="exportIncomeCsvBtn">Xuất CSV thu nhập</button>
      </div>
    </section>
  </main>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
